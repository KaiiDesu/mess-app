services:
  - type: web
    name: mess-app-backend
    runtime: node
    rootDir: server
    buildCommand: npm ci
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SOCKET_IO_CORS
        value: https://YOUR_FRONTEND_DOMAIN
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
